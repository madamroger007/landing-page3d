name: E2E Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  JWT_SECRET: ci-test-jwt-secret-only-for-github-actions
  NEXT_PUBLIC_MIDTRANS_CLIENT_KEY: ci-test-client-key
  MIDTRANS_SERVER_KEY: ci-test-server-key
  RESEND_API_KEY: ci-test-resend-key
  POSTGRES_URL: postgres://postgres:postgres@localhost:5432/postgres

jobs:
  e2e-smoke:
    name: Playwright Smoke (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 14
